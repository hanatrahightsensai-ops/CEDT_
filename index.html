<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXACT model - Engineering Physics Platform</title>
    
    <!-- External Dependencies (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,400;0,900;1,400;1,900&display=swap');
        
        body {
            font-family: 'Kanit', sans-serif;
            scroll-behavior: smooth;
        }
        
        /* 3D Cards & Animations */
        .perspective-2000 { perspective: 2000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #2563eb; border-radius: 20px; }

        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoom-in { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .animate-fade-in { animation: fade-in 0.5s ease-out; }
        .animate-zoom-in { animation: zoom-in 0.4s ease-out; }
        .animate-slide-up { animation: slide-up 0.4s ease-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-500">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { 
            Radar, RadarChart, PolarGrid, PolarAngleAxis, ResponsiveContainer 
        } = window.Recharts;

        // Stable SVG Icons
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                brain: <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .52 5.586 3.004 3.004 0 0 0 5.193 2.182.5.5 0 0 1 .81 0 3.004 3.004 0 0 0 5.193-2.182 4 4 0 0 0 .52-5.586 4 4 0 0 0-2.526-5.77A3 3 0 0 0 12 5z" />,
                chevronRight: <path d="m9 18 6-6-6-6" />,
                chevronLeft: <path d="m15 18-6-6 6-6" />,
                alert: <g><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" /><line x1="12" y1="9" x2="12" y2="13" /><line x1="12" y1="17" x2="12.01" y2="17" /></g>,
                check: <path d="M20 6 9 17l-5-5" />,
                sparkles: <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z" />,
                trophy: <g><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-2.34M12 4v10.66" /><path d="M8.2 13c.7 4.5 4.6 4.5 5.6 0l1.2-9h-8l1.2 9z" /></g>,
                calendar: <g><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></g>,
                x: <path d="M18 6 6 18M6 6l12 12" />,
                zap: <path d="M13 2 L3 14 L12 14 L11 22 L21 10 L12 10 Z" />,
                clock: <g><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></g>,
                compass: <g><circle cx="12" cy="12" r="10" /><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76" /></g>,
                grad: <g><path d="M22 10v6M2 10l10-5 10 5-10 5z" /><path d="M6 12v5c3 3 9 3 12 0v-5" /></g>,
                target: <g><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></g>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || icons.zap}
                </svg>
            );
        };

        // --- UPDATED CONFIGURATION ---
        const apiKey = "AIzaSyCO1HWMzO1oCjfsC5pq6KsDIO04AY35MVU"; // <--- ใส่ Gemini API Key ของคุณที่นี่
        const MODEL_NAME = "gemini-1.5-flash"; // เปลี่ยนเป็นรุ่นมาตรฐานสำหรับการรันภายนอก

        const i18n = {
            th: {
                welcome: "ยินดีต้อนรับสู่ EXACT model",
                welcomeSub: "กรุณากรอกชื่อและระดับชั้นการศึกษา เพื่อให้ AI ออกแบบเนื้อหาเฉพาะคุณ",
                nameLabel: "ชื่อเล่นของคุณ",
                namePlaceholder: "เช่น มาวิน...",
                levelLabel: "ระดับชั้นการศึกษา",
                levelPlaceholder: "เลือกชั้นปี...",
                levels: ["มัธยมศึกษาปีที่ 4", "มัธยมศึกษาปีที่ 5", "มัธยมศึกษาปีที่ 6"],
                next: "ถัดไป",
                goalTitle: "กำหนดจุดมุ่งหมาย (E)",
                topicTitle: "เลือกบทเรียนฟิสิกส์",
                examBtn: "เริ่มสอบ (X)",
                loadingAi: "EXACT AI กำลังประมวลผล...",
                loadingSub: "กำลังเตรียมเนื้อหา... ระบบจะทำงานต่อเนื่องจนเสร็จสิ้น",
                submitBtn: "ส่งคำตอบเพื่อประเมินผล",
                resultsTitle: "วิเคราะห์เชิงลึก (T)",
                roadmapBtn: "แผนการเรียน 5 วันสำหรับคุณ ✨",
                flashcardTitle: "Flashcards สรุปความจำ",
                flipHint: "คลิกการ์ดเพื่อพลิกดู",
                engRecommend: "คณะวิศวกรรมศาสตร์ที่แนะนำ ✨",
                backHome: "กลับหน้าแรก",
                assessmentTitle: "ผลการประเมิน (Bilingual)",
                strengthLabel: "จุดเด่น",
                weaknessLabel: "สิ่งที่ควรพัฒนา",
                strategyLabel: "กลยุทธ์การเรียน",
                dayLabel: "วันที่",
                radar_math: "คณิตศาสตร์",
                radar_physics: "ฟิสิกส์",
                radar_logic: "ตรรกะ",
                radar_accuracy: "ความแม่นยำ",
                sec: "วินาที",
                min: "นาที",
                topics: ["บทนำและแรง", "การเคลื่อนที่แนวตรง", "กฎของนิวตัน", "สมดุลกล", "งานและพลังงาน", "โมเมนตัม", "โพรเจกไทล์", "วงกลม", "การหมุน", "SHM", "ของไหล", "ความร้อน", "คลื่น", "เสียง", "แสง", "ไฟฟ้าสถิต", "ไฟฟ้ากระแส", "แม่เหล็ก"]
            },
            en: {
                welcome: "Welcome to EXACT model",
                welcomeSub: "Enter your name and grade so AI can tailor the content for you.",
                nameLabel: "Your Nickname",
                namePlaceholder: "e.g. Mawin...",
                levelLabel: "Education Level",
                levelPlaceholder: "Select Grade...",
                levels: ["Grade 10 (M.4)", "Grade 11 (M.5)", "Grade 12 (M.6)"],
                next: "Next",
                goalTitle: "Establish Goal (E)",
                topicTitle: "Physics Topics",
                examBtn: "Start Quiz (X)",
                loadingAi: "AI is processing...",
                loadingSub: "Preparing tailored content... Please wait",
                submitBtn: "Submit Evaluation",
                resultsTitle: "Transfer Analysis (T)",
                roadmapBtn: "Your 5-Day Roadmap ✨",
                flashcardTitle: "Smart Flashcards",
                flipHint: "Click card to flip",
                engRecommend: "Recommended Engineering ✨",
                backHome: "Back Home",
                assessmentTitle: "Evaluation (Bilingual)",
                strengthLabel: "Strengths",
                weaknessLabel: "Gaps",
                strategyLabel: "Strategy",
                dayLabel: "Day",
                radar_math: "Math",
                radar_physics: "Physics",
                radar_logic: "Logic",
                radar_accuracy: "Accuracy",
                sec: "sec",
                min: "min",
                topics: ["Forces", "Motion", "Newton's Laws", "Equilibrium", "Work & Energy", "Momentum", "Projectile", "Circular", "Rotational", "SHM", "Fluids", "Heat", "Waves", "Sound", "Optics", "Electrostatics", "Current", "Magnetism"]
            }
        };

        const ExactLogo = ({ size = 32, isDark = false }) => (
            <div className="flex items-center gap-2">
                <div className="relative group/logo">
                    <svg width={size} height={size} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" className="drop-shadow-lg transition-transform group-hover/logo:scale-110">
                        <rect width="100" height="100" rx="20" fill="#2563EB" />
                        <path d="M25 35H75M25 50H65M25 65H75" stroke="white" strokeWidth="10" strokeLinecap="round" />
                        <circle cx="80" cy="50" r="10" fill="#FBBF24" className="animate-pulse" />
                    </svg>
                </div>
                <div className="flex flex-col leading-none">
                    <span className={`text-xl font-black uppercase tracking-tighter italic ${isDark ? 'text-white' : 'text-blue-600'}`}>Exact</span>
                    <span className={`text-[8px] font-bold uppercase tracking-widest ${isDark ? 'text-blue-300' : 'text-blue-400'}`}>model</span>
                </div>
            </div>
        );

        function App() {
            const [lang, setLang] = useState('th'); 
            const [step, setStep] = useState('welcome'); 
            const [userData, setUserData] = useState({ name: '', educationLevel: '' });
            const [selectedTopic, setSelectedTopic] = useState(null);
            const [establishGoal, setEstablishGoal] = useState(''); 
            const [quizQuestions, setQuizQuestions] = useState([]); 
            const [userAnswers, setUserAnswers] = useState({}); 
            const [evaluation, setEvaluation] = useState(null); 
            const [isLoading, setIsLoading] = useState(false);
            const [errorMessage, setErrorMessage] = useState(null);
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [loadingTime, setLoadingTime] = useState(0);
            const [flippedCards, setFlippedCards] = useState({}); 

            const abortControllerRef = useRef(null);
            const t = i18n[lang];

            useEffect(() => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, [step]);

            useEffect(() => {
                let timer;
                if (isLoading) timer = setInterval(() => setLoadingTime(prev => prev + 1), 1000);
                else setLoadingTime(0);
                return () => clearInterval(timer);
            }, [isLoading]);

            const formatTime = (seconds) => {
                if (seconds < 60) return { val: seconds, unit: t.sec };
                return { val: Math.floor(seconds / 60), unit: t.min };
            };

            const callGemini = async (prompt, systemInstruction = "", schema = null) => {
                if (!apiKey) {
                    setErrorMessage("กรุณาใส่ API Key ในโค้ดก่อนใช้งาน (Please Insert API Key)");
                    return null;
                }
                const delays = [2000, 4000];
                for (let i = 0; i < delays.length; i++) {
                    try {
                        const payload = {
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: systemInstruction ? { parts: [{ text: systemInstruction }] } : undefined,
                            generationConfig: { 
                                responseMimeType: schema ? "application/json" : "text/plain",
                                ...(schema ? { responseSchema: schema } : {})
                            }
                        };
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
                            signal: abortControllerRef.current?.signal
                        });
                        
                        if (!response.ok) {
                            const errData = await response.json();
                            throw new Error(errData.error?.message || "API Error");
                        }
                        
                        const res = await response.json();
                        const txt = res.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (schema) return JSON.parse(txt.replace(/```json/g, "").replace(/```/g, "").trim());
                        return txt;
                    } catch (e) {
                        if (e.name === 'AbortError') return null;
                        if (i === delays.length - 1) throw e;
                        await new Promise(r => setTimeout(r, delays[i]));
                    }
                }
            };

            const generateQuiz = async (topic) => {
                setIsLoading(true);
                setStep('loading');
                setErrorMessage(null);
                abortControllerRef.current = new AbortController();
                const schema = {
                    type: "OBJECT",
                    properties: {
                        questions: {
                            type: "ARRAY",
                            items: {
                                type: "OBJECT",
                                properties: {
                                    id: { type: "NUMBER" },
                                    th: { type: "OBJECT", properties: { question: { type: "STRING" }, options: { type: "ARRAY", items: { type: "STRING" } } } },
                                    en: { type: "OBJECT", properties: { question: { type: "STRING" }, options: { type: "ARRAY", items: { type: "STRING" } } } },
                                    correctIndex: { type: "NUMBER" },
                                    explanation_th: { type: "STRING" },
                                    explanation_en: { type: "STRING" }
                                }, required: ["id", "th", "en", "correctIndex", "explanation_th", "explanation_en"]
                            }
                        }
                    }, required: ["questions"]
                };
                try {
                    const result = await callGemini(`Generate 5 MCQs for physics topic "${topic}" in BOTH Thai and English. Suitable for ${userData.educationLevel}.`, "Bilingual Physics Quiz JSON.", schema);
                    if (result && result.questions) {
                        setQuizQuestions(result.questions);
                        setStep('quiz');
                    }
                } catch (e) { 
                    setErrorMessage("ไม่สามารถดึงข้อมูลได้: " + e.message);
                    setStep('topic_selection'); 
                } finally { setIsLoading(false); }
            };

            const finishQuiz = async () => {
                setIsLoading(true);
                setStep('loading');
                abortControllerRef.current = new AbortController();
                const score = quizQuestions.reduce((acc, q, idx) => acc + (userAnswers[idx] === q.correctIndex ? 1 : 0), 0);
                const schema = {
                    type: "OBJECT",
                    properties: {
                        advice_th: { type: "STRING" }, advice_en: { type: "STRING" },
                        strengths_th: { type: "ARRAY", items: { type: "STRING" } }, strengths_en: { type: "ARRAY", items: { type: "STRING" } },
                        weaknesses_th: { type: "ARRAY", items: { type: "STRING" } }, weaknesses_en: { type: "ARRAY", items: { type: "STRING" } },
                        mathSkill: { type: "NUMBER" }, physicsSkill: { type: "NUMBER" }, logicalSkill: { type: "NUMBER" },
                        recommendedFaculties: { type: "ARRAY", items: { type: "OBJECT", properties: { name_th: { type: "STRING" }, name_en: { type: "STRING" }, reason_th: { type: "STRING" }, reason_en: { type: "STRING" }, focus_th: { type: "STRING" }, focus_en: { type: "STRING" }, careers_th: { type: "ARRAY", items: { type: "STRING" } }, careers_en: { type: "ARRAY", items: { type: "STRING" } } } } },
                        smartFlashcards: { type: "ARRAY", items: { type: "OBJECT", properties: { front_th: { type: "STRING" }, front_en: { type: "STRING" }, back_th: { type: "STRING" }, back_en: { type: "STRING" } } } },
                        roadmap: { type: "ARRAY", items: { type: "OBJECT", properties: { day: { type: "NUMBER" }, th: { type: "OBJECT", properties: { topic: { type: "STRING" }, activity: { type: "STRING" } } }, en: { type: "OBJECT", properties: { topic: { type: "STRING" }, activity: { type: "STRING" } } } } } }
                    }, required: ["advice_th", "advice_en", "strengths_th", "strengths_en", "mathSkill", "physicsSkill", "logicalSkill", "smartFlashcards", "roadmap"]
                };
                try {
                    const result = await callGemini(`Evaluate student score ${score}/5 on physics topic "${selectedTopic}". Provide full analysis, faculties and study roadmap.`, "Analysis JSON.", schema);
                    if (result) {
                        setEvaluation({
                            score, total: 5, ...result,
                            chartData: [
                                { radar_key: 'radar_math', A: result.mathSkill * 10 },
                                { radar_key: 'radar_physics', A: result.physicsSkill * 10 },
                                { radar_key: 'radar_logic', A: result.logicalSkill * 10 },
                                { radar_key: 'radar_accuracy', A: (score/5) * 100 },
                            ]
                        });
                        setStep('results');
                    }
                } catch(e) {
                    setErrorMessage("การประเมินผลขัดข้อง: " + e.message);
                    setStep('quiz');
                } finally { setIsLoading(false); }
            };

            const tDisplay = formatTime(loadingTime);

            return (
                <div className={`min-h-screen p-2 md:p-4 transition-colors duration-500 ${isDarkMode ? 'bg-slate-950 text-white' : 'bg-slate-50 text-slate-900'}`}>
                    <div className="fixed top-3 right-3 flex items-center gap-2 z-[60]">
                        <button onClick={() => setLang(lang === 'th' ? 'en' : 'th')} className="p-2 rounded-xl bg-white/80 dark:bg-slate-800 shadow border border-slate-200 dark:border-slate-700 text-[10px] font-black uppercase tracking-widest text-blue-600">
                            {lang === 'th' ? 'EN' : 'TH'}
                        </button>
                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 rounded-xl bg-white/80 dark:bg-slate-800 shadow border border-slate-200 dark:border-slate-700">
                            <Icon name={isDarkMode ? 'sun' : 'moon'} size={14} />
                        </button>
                    </div>

                    <header className="max-w-4xl mx-auto mb-6 text-center pt-2 flex justify-center">
                        <div onClick={() => window.location.reload()} className="cursor-pointer transition-transform hover:scale-105 active:scale-95">
                            <ExactLogo size={40} isDark={isDarkMode} />
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-2">
                        {errorMessage && (
                            <div className="bg-red-50 text-red-600 p-4 rounded-2xl mb-6 flex items-center gap-3 border border-red-100 font-bold animate-zoom-in text-xs">
                                <Icon name="alert" size={16} />
                                <span>{errorMessage}</span>
                                <button onClick={() => setErrorMessage(null)} className="ml-auto">✕</button>
                            </div>
                        )}

                        {step === 'welcome' && (
                            <div className="bg-white/70 dark:bg-slate-900/70 backdrop-blur shadow-2xl p-8 rounded-[3rem] text-center animate-slide-up border border-white/20 dark:border-slate-800">
                                <h1 className="text-3xl font-black mb-1 leading-tight">{t.welcome}</h1>
                                <p className="text-slate-500 dark:text-slate-400 mb-8 text-xs">{t.welcomeSub}</p>
                                <div className="max-w-xs mx-auto space-y-4 text-left">
                                    <input placeholder={t.namePlaceholder} value={userData.name} onChange={e => setUserData({...userData, name: e.target.value})} className="w-full p-4 rounded-2xl border-2 dark:border-slate-800 dark:bg-slate-950 outline-none focus:border-blue-500 transition-all font-bold text-sm" />
                                    <select value={userData.educationLevel} onChange={e => setUserData({...userData, educationLevel: e.target.value})} className="w-full p-4 rounded-2xl border-2 dark:border-slate-800 dark:bg-slate-950 outline-none appearance-none font-bold text-sm">
                                        <option value="">{t.levelPlaceholder}</option>
                                        {t.levels.map(l => <option key={l} value={l}>{l}</option>)}
                                    </select>
                                    <button onClick={() => setStep('goal_selection')} disabled={!userData.name || !userData.educationLevel} className="w-full bg-blue-600 text-white py-4 rounded-3xl font-black text-xl hover:bg-blue-700 disabled:opacity-30 transition-all shadow-xl">ถัดไป</button>
                                </div>
                            </div>
                        )}

                        {step === 'goal_selection' && (
                            <div className="bg-white dark:bg-slate-900 p-8 rounded-[3rem] shadow-xl border dark:border-slate-800 animate-slide-up">
                                <div className="flex items-center gap-3 mb-6">
                                    <button onClick={() => setStep('welcome')} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-all"><Icon name="chevronLeft" size={20} /></button>
                                    <h2 className="text-xl font-black italic">{t.goalTitle}</h2>
                                </div>
                                <div className="grid gap-3 mb-8">
                                    {[{id:'none', l:lang==='th'?'ไม่เข้าใจเลย':'No understanding'},{id:'some', l:lang==='th'?'พอเข้าใจบ้าง':'Some basics'},{id:'fast', l:lang==='th'?'เน้นเร็วสรุป':'Fast summary'}].map(g => (
                                        <button key={g.id} onClick={() => setEstablishGoal(g.l)} className={`p-5 rounded-2xl border-2 text-left transition-all ${establishGoal === g.l ? 'border-blue-600 bg-blue-50 dark:bg-blue-900/20' : 'border-slate-100 dark:border-slate-800 hover:border-blue-300'}`}>
                                            <span className="font-black text-sm">{g.l}</span>
                                        </button>
                                    ))}
                                </div>
                                <button onClick={() => setStep('topic_selection')} disabled={!establishGoal} className="w-full bg-blue-600 text-white py-4 rounded-3xl font-black">{t.next}</button>
                            </div>
                        )}

                        {step === 'topic_selection' && (
                            <div className="animate-slide-up">
                                <div className="flex items-center gap-3 mb-4">
                                    <button onClick={() => setStep('goal_selection')} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-all"><Icon name="chevronLeft" size={20} /></button>
                                    <h2 className="text-xl font-black italic">{t.topicTitle}</h2>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-2 mb-8 max-h-[40vh] overflow-y-auto pr-1 custom-scrollbar p-1">
                                    {t.topics.map(topic => (
                                        <button key={topic} onClick={() => setSelectedTopic(topic)} className={`p-3 rounded-xl border text-[10px] font-bold transition-all ${selectedTopic === topic ? 'bg-blue-600 text-white border-blue-600 shadow-lg' : 'bg-white dark:bg-slate-900 border-slate-100 dark:border-slate-800'}`}>{topic}</button>
                                    ))}
                                </div>
                                {selectedTopic && (
                                    <div className="bg-blue-600 p-6 rounded-[2.5rem] flex flex-col md:flex-row items-center justify-between gap-4 text-white animate-zoom-in relative overflow-hidden shadow-xl">
                                        <div className="flex items-center gap-3 font-black text-xl z-10"><Icon name="sparkles" /> {selectedTopic}</div>
                                        <button onClick={() => generateQuiz(selectedTopic)} className="bg-white text-blue-600 px-10 py-3 rounded-2xl font-black shadow-lg uppercase z-10">เริ่มสอบ</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {step === 'loading' && (
                            <div className="text-center py-20 bg-white dark:bg-slate-900 p-10 rounded-[3rem] shadow-xl border dark:border-slate-800 animate-zoom-in">
                                <div className="relative w-32 h-32 mx-auto mb-10 flex items-center justify-center">
                                    <div className="absolute inset-0 rounded-full border-4 border-slate-100 dark:border-slate-800"></div>
                                    <div className="w-24 h-24 rounded-full border-4 border-blue-600 border-t-transparent animate-spin"></div>
                                    <div className="absolute inset-0 flex flex-col items-center justify-center">
                                        <span className="font-black text-2xl text-blue-600 tabular-nums">{tDisplay.val}</span>
                                        <span className="text-[9px] font-black uppercase text-blue-400">{tDisplay.unit}</span>
                                    </div>
                                </div>
                                <h2 className="text-2xl font-black text-blue-600 mb-2 leading-none">กำลังโหลด...</h2>
                                <p className="text-slate-400 text-xs italic">AI กำลังเตรียมข้อสอบพิเศษให้คุณ</p>
                                <button onClick={() => { if(abortControllerRef.current) abortControllerRef.current.abort(); setIsLoading(false); setStep('topic_selection'); }} className="mt-8 px-6 py-2 bg-red-50 text-red-500 rounded-xl font-bold text-[10px] uppercase border">Cancel</button>
                            </div>
                        )}

                        {step === 'quiz' && (
                            <div className="space-y-6 pb-20 animate-fade-in">
                                <div className="bg-blue-600 text-white p-6 rounded-3xl font-black text-2xl flex justify-between items-center shadow-lg">
                                    <span>X - {selectedTopic}</span>
                                    <Icon name="zap" size={24} />
                                </div>
                                {quizQuestions.map((q, idx) => (
                                    <div key={idx} className="bg-white dark:bg-slate-900 p-6 rounded-[2rem] shadow-xl space-y-6 border dark:border-slate-800">
                                        <div className="flex gap-3 font-black leading-tight">
                                            <div className="shrink-0 w-8 h-8 bg-blue-50 dark:bg-blue-900/30 text-blue-600 font-black rounded-lg flex items-center justify-center text-xs">Q{idx+1}</div>
                                            <p className="text-lg">{lang === 'th' ? q.th.question : q.en.question}</p>
                                        </div>
                                        <div className="grid gap-2 font-black">
                                            {(lang === 'th' ? q.th.options : q.en.options).map((opt, oIdx) => (
                                                <button key={oIdx} onClick={() => setUserAnswers({...userAnswers, [idx]: oIdx})} className={`p-4 rounded-xl border-2 text-left text-sm transition-all ${userAnswers[idx] === oIdx ? 'bg-blue-50 border-blue-600 dark:bg-blue-900/20' : 'border-slate-100 dark:border-slate-800 hover:border-blue-200'}`}>
                                                    {opt}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                                <button onClick={finishQuiz} disabled={Object.keys(userAnswers).length < 5} className="w-full bg-green-600 text-white py-5 rounded-[2.5rem] font-black text-xl shadow-xl hover:bg-green-700 active:scale-95 transition-all">ส่งคำตอบ</button>
                            </div>
                        )}

                        {step === 'results' && evaluation && (
                            <div className="animate-fade-in space-y-8 pb-20 px-1">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-blue-600 text-white p-8 rounded-[3rem] text-center shadow-xl flex flex-col items-center justify-center">
                                        <Icon name="trophy" size={32} className="mb-3 text-yellow-300" />
                                        <div className="text-6xl font-black italic leading-none">{evaluation.score}</div>
                                        <div className="text-[8px] font-black uppercase opacity-60 mt-2 tracking-widest leading-none">SCORE</div>
                                    </div>
                                    <div className="md:col-span-2 bg-white dark:bg-slate-900 p-6 rounded-[3rem] shadow-xl border dark:border-slate-800 h-64">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <RadarChart cx="50%" cy="50%" outerRadius="80%" data={evaluation.chartData}>
                                                <PolarGrid stroke="#e2e8f0" />
                                                <PolarAngleAxis 
                                                    dataKey="radar_key" 
                                                    tick={(props) => {
                                                        const { x, y, payload } = props;
                                                        return (
                                                            <text x={x} y={y} textAnchor="middle" fontSize={8} fontWeight={900} fill={isDarkMode ? '#94a3b8' : '#64748b'}>
                                                                {t[payload.value]}
                                                            </text>
                                                        );
                                                    }}
                                                />
                                                <Radar name="Skills" dataKey="A" stroke="#2563eb" strokeWidth={3} fill="#3b82f6" fillOpacity={0.4} />
                                            </RadarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                <div className="bg-white dark:bg-slate-900 p-8 rounded-[3rem] shadow-xl border-l-[16px] border-amber-500 border dark:border-slate-800">
                                    <h3 className="text-2xl font-black mb-6 text-amber-500 uppercase italic leading-none">{t.assessmentTitle}</h3>
                                    <div className="grid md:grid-cols-2 gap-4 mb-8 text-xs font-bold">
                                        <div className="bg-green-50 dark:bg-green-900/10 p-5 rounded-2xl border border-green-100 dark:border-green-800/30">
                                            <h4 className="font-black text-green-700 dark:text-green-400 mb-2 uppercase text-[9px] tracking-widest">{t.strengthLabel}</h4>
                                            <ul className="space-y-1">
                                                {(lang === 'th' ? evaluation.strengths_th : (evaluation.strengths_en || [])).map((s,i) => <li key={i}>✓ {s}</li>)}
                                            </ul>
                                        </div>
                                        <div className="bg-red-50 dark:bg-red-900/10 p-5 rounded-2xl border border-red-100 dark:border-red-800/30">
                                            <h4 className="font-black text-red-700 dark:text-red-400 mb-2 uppercase text-[9px] tracking-widest">{t.weaknessLabel}</h4>
                                            <ul className="space-y-1">
                                                {(lang === 'th' ? evaluation.weaknesses_th : (evaluation.weaknesses_en || [])).map((w,i) => <li key={i}>! {w}</li>)}
                                            </ul>
                                        </div>
                                    </div>
                                    <div className="p-6 bg-slate-950 text-white rounded-2xl border-t-4 border-blue-500 shadow-xl">
                                        <p className="text-base font-black leading-tight italic underline decoration-blue-500/30">
                                           "{lang === 'th' ? evaluation.advice_th : evaluation.advice_en}"
                                        </p>
                                    </div>
                                </div>

                                <div className="pt-4">
                                    <h3 className="text-3xl font-black italic tracking-tighter uppercase flex items-center gap-4 mb-6"><Icon name="calendar" size={28}/> {t.roadmapBtn}</h3>
                                    <div className="grid md:grid-cols-5 gap-3">
                                        {(evaluation.roadmap || []).map((d, i) => (
                                            <div key={i} className="bg-white dark:bg-slate-900 p-6 rounded-3xl border-t-8 border-blue-600 shadow-xl flex flex-col h-full border dark:border-slate-800">
                                                <span className="text-[9px] font-black text-blue-500 mb-2 uppercase flex items-center gap-1">Day {d.day}</span>
                                                <h4 className="text-sm font-black mb-3 leading-tight">{lang === 'th' ? d.th.topic : d.en.topic}</h4>
                                                <div className="mt-auto bg-slate-50 dark:bg-slate-950 p-3 rounded-xl border dark:border-slate-800 font-black">
                                                    <p className="text-[10px] italic text-slate-500 leading-tight">"{lang === 'th' ? d.th.activity : d.en.activity}"</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="flex gap-4 pt-6">
                                    <button onClick={() => setStep('welcome')} className="flex-1 border-2 border-slate-200 dark:border-slate-800 py-4 rounded-3xl font-black text-xs uppercase tracking-widest">{t.backHome}</button>
                                    <button onClick={() => setStep('topic_selection')} className="flex-1 bg-blue-600 text-white py-4 rounded-3xl font-black text-xs shadow-xl uppercase tracking-widest hover:scale-105 active:scale-95 transition-all">ลองบทอื่น</button>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-20 py-10 text-center opacity-10 font-black text-2xl tracking-[1em]">EXACT model</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
