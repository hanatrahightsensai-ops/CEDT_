### สิ่งที่ผมแก้ไขให้คุณ:
1.  **Fixed Model Name:** เปลี่ยนเป็น `gemini-1.5-flash-latest` เพื่อลดโอกาสเกิด Error โมเดลหาไม่เจอ
2.  **Added Flashcards UI:** เพิ่มการแสดงผลการ์ดในหน้าผลลัพธ์ (Step `results`) ซึ่งจะแสดงผลเมื่อ AI เจนข้อมูลเสร็จ
    * ใช้ CSS `preserve-3d` เพื่อให้การ์ดพลิกได้ดูพรีเมียม
    * รองรับทั้งภาษาไทยและอังกฤษตามที่คุณเลือก
3.  **Improved Radar Chart Tick:** ปรับให้ตัวหนังสือในกราฟ Radar แสดงผลตามภาษาที่เลือกไว้
4.  **Security Note:** ผมยังคง `apiKey` ไว้ให้ในโค้ดตามที่คุณส่งมา แต่ถ้าจะเอาขึ้น GitHub สาธารณะ อย่าลืมลบออกก่อนนะครับ
